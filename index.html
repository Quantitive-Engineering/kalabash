<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalabash — Coming Soon</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow: hidden;
    }
    video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: 0;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1;
    }
    .content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .logo img {
      height: 120px;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 3px;
      margin-bottom: 16px;
    }
    p {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
    }
    .footer {
      position: fixed;
      bottom: 30px;
      z-index: 2;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.5);
    }
    .footer a {
      color: white;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
    @media (max-width: 768px) {
      .logo img { height: 80px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <video autoplay muted loop playsinline>
    <source src="media/Videos/kalabash video 1.webm" type="video/webm">
  </video>
  <div class="overlay"></div>
  <div class="content">
    <div class="logo">
      <img src="media/Images/Kalabash-white logo.PNG" alt="Kalabash Restaurant">
    </div>
    <h1>Coming Soon</h1>
    <p>Website is under maintenance. We'll be back shortly.</p>
  </div>
  <div class="footer">
    <p>Part of <a href="https://bloomhospitality.co" target="_blank">Bloom Hospitality</a></p>
  </div>
</body>
</html>
